UserParameter=wavelog.active_users[*],mysql -u $1 -p'$2' -NB -e "SELECT COUNT(last_seen) FROM users WHERE TIMESTAMPDIFF(MINUTE, last_seen, UTC_TIMESTAMP()) < $4;" $3
UserParameter=wavelog.total_qsos[*],mysql -u $1 -p'$2' -NB -e "SELECT COUNT(COL_PRIMARY_KEY) FROM $4;" $3
UserParameter=wavelog.total_users[*],mysql -u $1 -p'$2' -NB -e "SELECT COUNT(user_id) FROM users WHERE clubstation=0;" $3
UserParameter=wavelog.total_clubstations[*],mysql -u $1 -p'$2' -NB -e "SELECT COUNT(user_id) FROM users WHERE clubstation=1;" $3
UserParameter=wavelog.mig_version[*],mysql -u $1 -p'$2' -NB -e "SELECT version FROM migrations ORDER BY version DESC LIMIT 1;" $3
UserParameter=wavelog.app_version[*],mysql -u $1 -p'$2' -NB -e "SELECT option_value FROM options WHERE option_name = 'version';" $3
UserParameter=wavelog.avail_version[*],mysql -u $1 -p'$2' -NB -e "SELECT option_value FROM options WHERE option_name = 'latest_release';" $3
UserParameter=wavelog.total_locations[*],mysql -u $1 -p'$2' -NB -e "SELECT COUNT(station_id) FROM station_profile;" $3
UserParameter=wavelog.total_logbooks[*],mysql -u $1 -p'$2' -NB -e "SELECT COUNT(logbook_id) FROM station_logbooks;" $3

UserParameter=wavelog.mig_version_file[*],grep migration_version $1/application/config/migration.php 2>/dev/null | grep -oE '[0-9]+' || echo 0

UserParameter=wavelog.mastercron.last_run[*],mysql -u $1 -p'$2' -NB -e "SELECT option_value FROM options WHERE option_name = 'mastercron_last_run';" $3
UserParameter=wavelog.cron.discovery[*],mysql -u $1 -p'$2' -NB -e "SELECT CONCAT('{\"data\":[', GROUP_CONCAT(CONCAT('{', '\"{\#CRON_ID}\":\"', id, '\",', '\"{\#CRON_DESC}\":\"', description, '\"', '}') SEPARATOR ','), ']}') FROM cron;" $3
UserParameter=wavelog.cron.status[*],mysql -u $1 -p'$2' -NB -e "SELECT status FROM cron WHERE id = '$4';" $3
UserParameter=wavelog.cron.enabled[*],mysql -u $1 -p'$2' -NB -e "SELECT enabled FROM cron WHERE id = '$4';" $3
UserParameter=wavelog.cron.last_run[*],mysql -u $1 -p'$2' -NB -e "SELECT last_run FROM cron WHERE id = '$4';" $3
UserParameter=wavelog.cron.next_run[*],mysql -u $1 -p'$2' -NB -e "SELECT next_run FROM cron WHERE id = '$4';" $3

UserParameter=wavelog.user.discovery[*],mysql -u $1 -p'$2' -NB -e "SELECT CONCAT('{\"data\":[', GROUP_CONCAT(CONCAT('{', '\"{\#USER_ID}\":\"', user_id, '\",', '\"{\#USER_NAME}\":\"', user_name, '\",', '\"{\#USER_CALLSIGN}\":\"', user_callsign, '\"', '}') SEPARATOR ','), ']}') FROM users WHERE clubstation=0;" $3
UserParameter=wavelog.user.last_seen[*],mysql -u $1 -p'$2' -NB -e "SELECT last_seen FROM users WHERE user_id = '$4';" $3
UserParameter=wavelog.user.type[*],mysql -u $1 -p'$2' -NB -e "SELECT user_type FROM users WHERE user_id = '$4';" $3
UserParameter=wavelog.user.email[*],mysql -u $1 -p'$2' -NB -e "SELECT user_email FROM users WHERE user_id = '$4';" $3
UserParameter=wavelog.user.callsign[*],mysql -u $1 -p'$2' -NB -e "SELECT user_callsign FROM users WHERE user_id = '$4';" $3
UserParameter=wavelog.user.login_attempts[*],mysql -u $1 -p'$2' -NB -e "SELECT login_attempts FROM users WHERE user_id = '$4';" $3

UserParameter=wavelog.cat.discovery[*],mysql -u $1 -p'$2' -NB -e "SELECT CONCAT('{\"data\":[', GROUP_CONCAT(CONCAT('{', '\"{\#CAT_ID}\":\"', id, '\",', '\"{\#CAT_RADIO}\":\"', radio, '\",', '\"{\#CAT_USER_ID}\":\"', user_id, '\"', '}') SEPARATOR ','), ']}') FROM cat;" $3
UserParameter=wavelog.cat.last_modified[*],mysql -u $1 -p'$2' -NB -e "SELECT last_modified FROM cat WHERE id = '$4';" $3
UserParameter=wavelog.cat.frequency[*],mysql -u $1 -p'$2' -NB -e "SELECT frequency FROM cat WHERE id = '$4';" $3
UserParameter=wavelog.cat.mode[*],mysql -u $1 -p'$2' -NB -e "SELECT mode FROM cat WHERE id = '$4';" $3
UserParameter=wavelog.cat.power[*],mysql -u $1 -p'$2' -NB -e "SELECT power FROM cat WHERE id = '$4';" $3
UserParameter=wavelog.cat.operator[*],mysql -u $1 -p'$2' -NB -e "SELECT u.user_callsign FROM cat c JOIN users u ON c.operator = u.user_id WHERE c.id = '$4';" $3
UserParameter=wavelog.cat.user[*],mysql -u $1 -p'$2' -NB -e "SELECT u.user_callsign FROM cat c JOIN users u ON c.user_id = u.user_id WHERE c.id = '$4';" $3

