# Parameters: $1 = DB host, $2 = DB user, $3 = DB password, $4 = DB name, $5 = key-specific (threshold/table/id)
# The password is passed via MYSQL_PWD so it does not show up in the process list.
# Discovery keys build their JSON with JSON_OBJECT() so special characters are escaped properly;
# group_concat_max_len is raised because the default (1024) truncates the JSON on larger instances.

UserParameter=wavelog.active_users[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT COUNT(last_seen) FROM users WHERE TIMESTAMPDIFF(MINUTE, last_seen, UTC_TIMESTAMP()) < $5;" '$4'
UserParameter=wavelog.total_qsos[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT COUNT(COL_PRIMARY_KEY) FROM $5;" '$4'
UserParameter=wavelog.total_users[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT COUNT(user_id) FROM users WHERE clubstation=0;" '$4'
UserParameter=wavelog.total_clubstations[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT COUNT(user_id) FROM users WHERE clubstation=1;" '$4'
UserParameter=wavelog.mig_version[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT version FROM migrations ORDER BY version DESC LIMIT 1;" '$4'
UserParameter=wavelog.app_version[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT option_value FROM options WHERE option_name = 'version';" '$4'
UserParameter=wavelog.avail_version[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT option_value FROM options WHERE option_name = 'latest_release';" '$4'
UserParameter=wavelog.total_locations[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT COUNT(station_id) FROM station_profile;" '$4'
UserParameter=wavelog.total_logbooks[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT COUNT(logbook_id) FROM station_logbooks;" '$4'

UserParameter=wavelog.mig_version_file[*],grep -m1 migration_version $1/application/config/migration.php 2>/dev/null | grep -m1 -oE '[0-9]+' || echo 0

UserParameter=wavelog.mastercron.last_run[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT option_value FROM options WHERE option_name = 'mastercron_last_run';" '$4'
UserParameter=wavelog.cron.discovery[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SET SESSION group_concat_max_len = 1000000; SELECT COALESCE(CONCAT('{\"data\":[', GROUP_CONCAT(JSON_OBJECT('{#CRON_ID}', id, '{#CRON_DESC}', description) SEPARATOR ','), ']}'), '{\"data\":[]}') FROM cron;" '$4'
UserParameter=wavelog.cron.status[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT status FROM cron WHERE id = '$5';" '$4'
UserParameter=wavelog.cron.enabled[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT enabled FROM cron WHERE id = '$5';" '$4'
UserParameter=wavelog.cron.last_run[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT last_run FROM cron WHERE id = '$5';" '$4'
UserParameter=wavelog.cron.next_run[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT next_run FROM cron WHERE id = '$5';" '$4'

UserParameter=wavelog.user.discovery[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SET SESSION group_concat_max_len = 1000000; SELECT COALESCE(CONCAT('{\"data\":[', GROUP_CONCAT(JSON_OBJECT('{#USER_ID}', user_id, '{#USER_NAME}', user_name, '{#USER_CALLSIGN}', user_callsign) SEPARATOR ','), ']}'), '{\"data\":[]}') FROM users WHERE clubstation=0;" '$4'
UserParameter=wavelog.user.last_seen[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT last_seen FROM users WHERE user_id = '$5';" '$4'
UserParameter=wavelog.user.type[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT user_type FROM users WHERE user_id = '$5';" '$4'
UserParameter=wavelog.user.email[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT user_email FROM users WHERE user_id = '$5';" '$4'
UserParameter=wavelog.user.callsign[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT user_callsign FROM users WHERE user_id = '$5';" '$4'
UserParameter=wavelog.user.login_attempts[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT login_attempts FROM users WHERE user_id = '$5';" '$4'

UserParameter=wavelog.cat.discovery[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SET SESSION group_concat_max_len = 1000000; SELECT COALESCE(CONCAT('{\"data\":[', GROUP_CONCAT(JSON_OBJECT('{#CAT_ID}', id, '{#CAT_RADIO}', radio, '{#CAT_USER_ID}', user_id) SEPARATOR ','), ']}'), '{\"data\":[]}') FROM cat;" '$4'
UserParameter=wavelog.cat.last_modified[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT last_modified FROM cat WHERE id = '$5';" '$4'
UserParameter=wavelog.cat.frequency[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT frequency FROM cat WHERE id = '$5';" '$4'
UserParameter=wavelog.cat.mode[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT mode FROM cat WHERE id = '$5';" '$4'
UserParameter=wavelog.cat.power[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT power FROM cat WHERE id = '$5';" '$4'
UserParameter=wavelog.cat.operator[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT u.user_callsign FROM cat c JOIN users u ON c.operator = u.user_id WHERE c.id = '$5';" '$4'
UserParameter=wavelog.cat.user[*],MYSQL_PWD='$3' mysql -h '$1' -u '$2' -NB -e "SELECT u.user_callsign FROM cat c JOIN users u ON c.user_id = u.user_id WHERE c.id = '$5';" '$4'

# Wavelog Worker (https://github.com/wavelog/wavelog_worker), optional.
# Host, port and secret come from the template macros ($1 = host, $2 = port, $3 = secret).
# Discovery is gated by the {$WAVELOG_WORKER_ENABLED} macro in the template, so these
# keys stay idle unless the Worker is enabled there.
UserParameter=wavelog.worker.discovery,echo '[{"{#SINGLETON}":"0"}]'
UserParameter=wavelog.worker.status[*],curl -sf -H "X-Worker-Secret: $3" http://$1:$2/internal/status
