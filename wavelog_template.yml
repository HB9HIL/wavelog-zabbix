zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications
  templates:
    - uuid: 15fbb1064de8404fa26949ef82af9aa7
      template: 'Wavelog by Zabbix agent2'
      name: 'Wavelog by Zabbix agent2'
      description: |
        Template to monitor a Wavelog Instance
        prepared by HB9HIL
      groups:
        - name: Templates/Applications
      items:
        - uuid: 01a34a43606c4c42bb5a9334ac682f49
          name: 'Active Users'
          key: 'wavelog.active_users[{$DB_NAME},{$ACTIVE_THRESHOLD}]'
          value_type: FLOAT
          tags:
            - tag: application
              value: wavelog
        - uuid: 24b464ccbe8b45edbb01f6771be11629
          name: 'Application Version'
          key: 'wavelog.app_version[{$DB_NAME}]'
          delay: 5m
          value_type: TEXT
          tags:
            - tag: application
              value: wavelog
          triggers:
            - uuid: 4b438f5fc1ac439f9c9d1860a9253393
              expression: 'change(/Wavelog by Zabbix agent2/wavelog.app_version[{$DB_NAME}])<>0'
              name: 'Wavelog: Version has changed'
              priority: INFO
              manual_close: 'YES'
        - uuid: 108ae29f699242b381f0fc17dadf8644
          name: 'Latest Release (available Version)'
          key: 'wavelog.avail_version[{$DB_NAME}]'
          delay: 1h
          value_type: TEXT
          description: 'Fetched from database. Requires the Cronjob to run'
          tags:
            - tag: application
              value: wavelog
        - uuid: 0a5469f43c9f424393006a3a0ff04743
          name: 'Mastercron Last Run'
          key: 'wavelog.mastercron.last_run[{$DB_NAME}]'
          units: unixtime
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var match = value.match(/(\d{4})(\d{2})(\d{2}) (\d{2}):(\d{2}):(\d{2})/);
                  return Date.UTC(match[1], match[2]-1, match[3], match[4], match[5], match[6]) / 1000;
          tags:
            - tag: application
              value: wavelog
          triggers:
            - uuid: c17d3e746ed04b438f6ffe3819c25f8a
              expression: 'now() - last(/Wavelog by Zabbix agent2/wavelog.mastercron.last_run[{$DB_NAME}]) > 600'
              name: 'Wavelog: Mastercron did not run for 10 Minutes'
              priority: HIGH
              manual_close: 'YES'
        - uuid: 62c155e8bfef44a8a97fb38316e9a1e0
          name: 'Migrations Version (DB)'
          key: 'wavelog.mig_version[{$DB_NAME}]'
          delay: 5m
          value_type: TEXT
          tags:
            - tag: application
              value: wavelog
        - uuid: 7d2ee9bb386048028fc881fe2f2a102f
          name: 'Migrations Version (File)'
          key: 'wavelog.mig_version_file[{$WAVELOG_PATH}]'
          delay: 5m
          value_type: FLOAT
          trends: '0'
          tags:
            - tag: application
              value: wavelog
        - uuid: d75593efd61c4690a82284ce8745a336
          name: 'Total Clubstations on instance'
          key: 'wavelog.total_clubstations[{$DB_NAME}]'
          delay: 2m
          value_type: FLOAT
          tags:
            - tag: application
              value: wavelog
        - uuid: 2c92a471515f491d9c7bc048d6fb20a5
          name: 'Total Station Locations on instance'
          key: 'wavelog.total_locations[{$DB_NAME}]'
          delay: 5m
          value_type: FLOAT
          tags:
            - tag: application
              value: wavelog
        - uuid: abd125a963e545a3b98421576d4dc857
          name: 'Total Station Logbooks on instance'
          key: 'wavelog.total_logbooks[{$DB_NAME}]'
          delay: 5m
          value_type: FLOAT
          tags:
            - tag: application
              value: wavelog
        - uuid: ee76c4bd18154fa3a915a504600695f7
          name: 'Total QSOs on Instance'
          key: 'wavelog.total_qsos[{$DB_NAME},{$QSO_TABLE}]'
          value_type: FLOAT
          units: '!'
          tags:
            - tag: application
              value: wavelog
        - uuid: 12ca0254cc044b568595e9b9845f6818
          name: 'Total Users on instance'
          key: 'wavelog.total_users[{$DB_NAME}]'
          delay: 2m
          value_type: FLOAT
          tags:
            - tag: application
              value: wavelog
      discovery_rules:
        - uuid: 53efd2fd3e40459494fdeed700f94539
          name: 'Hardware Interfaces Discovery'
          key: 'wavelog.cat.discovery[{$DB_NAME}]'
          delay: 1h
          item_prototypes:
            - uuid: 4df59c1f59954a4ca4d4e833d275b1ff
              name: 'CAT Interface [{#CAT_ID}/{#CAT_RADIO}] Frequency'
              key: 'wavelog.cat.frequency[{$DB_NAME},{#CAT_ID}]'
              value_type: FLOAT
              units: Hz
              tags:
                - tag: application
                  value: wavelog
            - uuid: 8ee28d83decc4bba808e2363d2e6d110
              name: 'CAT Interface [{#CAT_ID}/{#CAT_RADIO}] Last used'
              key: 'wavelog.cat.last_modified[{$DB_NAME},{#CAT_ID}]'
              units: unixtime
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var match = value.match(/(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2})/);
                      return Date.UTC(match[1], match[2]-1, match[3], match[4], match[5], match[6]) / 1000;
              tags:
                - tag: application
                  value: wavelog
            - uuid: 0212bac371fc46f6b874cdb97c833db0
              name: 'CAT Interface [{#CAT_ID}/{#CAT_RADIO}] Mode'
              key: 'wavelog.cat.mode[{$DB_NAME},{#CAT_ID}]'
              value_type: TEXT
              tags:
                - tag: application
                  value: wavelog
            - uuid: cc8673bf2c9f4cbebfe124d49a8486ce
              name: 'CAT Interface [{#CAT_ID}/{#CAT_RADIO}] Operator'
              key: 'wavelog.cat.operator[{$DB_NAME},{#CAT_ID}]'
              value_type: TEXT
              tags:
                - tag: application
                  value: wavelog
            - uuid: bc956c8dae0b4cecaf2d5c5080df9802
              name: 'CAT Interface [{#CAT_ID}/{#CAT_RADIO}] Power'
              key: 'wavelog.cat.power[{$DB_NAME},{#CAT_ID}]'
              value_type: FLOAT
              trends: '0'
              units: W
              tags:
                - tag: application
                  value: wavelog
            - uuid: 018d006535fa4cbebf93bbf06960d838
              name: 'CAT Interface [{#CAT_ID}/{#CAT_RADIO}] User Account'
              key: 'wavelog.cat.user[{$DB_NAME},{#CAT_ID}]'
              delay: 1h
              value_type: TEXT
              tags:
                - tag: application
                  value: wavelog
        - uuid: 3e17512b0139467a9cfb17f7f3421f76
          name: 'Cronjobs Discovery'
          key: 'wavelog.cron.discovery[{$DB_NAME}]'
          delay: 1h
          item_prototypes:
            - uuid: 5065584f295e423786247cecbee4a15e
              name: 'Cronjob [{#CRON_ID}] Enabled'
              key: 'wavelog.cron.enabled[{$DB_NAME},{#CRON_ID}]'
              value_type: TEXT
              tags:
                - tag: application
                  value: wavelog
            - uuid: 4e3d4165a566469d84d86e7ec655f2b1
              name: 'Cronjob [{#CRON_ID}] Last Run'
              key: 'wavelog.cron.last_run[{$DB_NAME},{#CRON_ID}]'
              trends: '0'
              units: unixtime
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var match = value.match(/(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2})/);
                      return Date.UTC(match[1], match[2]-1, match[3], match[4], match[5], match[6]) / 1000;
              tags:
                - tag: application
                  value: wavelog
            - uuid: 0772905b864b4bc5a6cc02140594b64e
              name: 'Cronjob [{#CRON_ID}] Next Run'
              key: 'wavelog.cron.next_run[{$DB_NAME},{#CRON_ID}]'
              trends: '0'
              units: unixtime
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var match = value.match(/(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2})/);
                      return Date.UTC(match[1], match[2]-1, match[3], match[4], match[5], match[6]) / 1000;
              tags:
                - tag: application
                  value: wavelog
            - uuid: 528aeb1cb59b49349625ba062583cdbb
              name: 'Cronjob [{#CRON_ID}] Status'
              key: 'wavelog.cron.status[{$DB_NAME},{#CRON_ID}]'
              value_type: TEXT
              tags:
                - tag: application
                  value: wavelog
          trigger_prototypes:
            - uuid: 4e625b31d11940f2b53ada6d26ae98db
              expression: 'last(/Wavelog by Zabbix agent2/wavelog.cron.status[{$DB_NAME},{#CRON_ID}])<>"healthy" and last(/Wavelog by Zabbix agent2/wavelog.cron.enabled[{$DB_NAME},{#CRON_ID}])=1'
              name: 'Cronjob [{#CRON_ID}] not healthy'
              priority: HIGH
        - uuid: 54536a2b33044c06bbd18eef1a33bff2
          name: 'Users Discovery'
          key: 'wavelog.user.discovery[{$DB_NAME}]'
          delay: 1h
          item_prototypes:
            - uuid: 11a87ce4253241f087782278e20d0d7a
              name: 'User [{#USER_NAME}] Callsign'
              key: 'wavelog.user.callsign[{$DB_NAME},{#USER_ID}]'
              delay: 10m
              value_type: TEXT
              tags:
                - tag: application
                  value: wavelog
              trigger_prototypes:
                - uuid: 3d73f23751e947e3952d58f252e15a00
                  expression: 'change(/Wavelog by Zabbix agent2/wavelog.user.callsign[{$DB_NAME},{#USER_ID}])=1'
                  name: 'User [{#USER_NAME}] changed his callsign'
                  priority: INFO
                  manual_close: 'YES'
            - uuid: a8eb8c885f9348f0b0c5e576a9071e9c
              name: 'User [{#USER_NAME}] E-Mail Address'
              key: 'wavelog.user.email[{$DB_NAME},{#USER_ID}]'
              delay: 10m
              value_type: TEXT
              tags:
                - tag: application
                  value: wavelog
            - uuid: 3a1ee52dfb9c418c823a6afbe0110cf3
              name: 'User [{#USER_NAME}] Last Seen'
              key: 'wavelog.user.last_seen[{$DB_NAME},{#USER_ID}]'
              units: unixtime
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var match = value.match(/(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2})/);
                      return Date.UTC(match[1], match[2]-1, match[3], match[4], match[5], match[6]) / 1000;
              tags:
                - tag: application
                  value: wavelog
            - uuid: 9518e5dedde34b55947ff098623aa11c
              name: 'User [{#USER_NAME}] Login Attempts'
              key: 'wavelog.user.login_attempts[{$DB_NAME},{#USER_ID}]'
              value_type: FLOAT
              tags:
                - tag: application
                  value: wavelog
              trigger_prototypes:
                - uuid: 4ae59a9f68a846acafdcd1aa53b2bc35
                  expression: 'last(/Wavelog by Zabbix agent2/wavelog.user.login_attempts[{$DB_NAME},{#USER_ID}])>={$MAX_LOGIN_ATTEMPTS}'
                  name: 'User [{#USER_NAME}] has {$MAX_LOGIN_ATTEMPTS} failed login attempts'
                  priority: AVERAGE
            - uuid: e9d62b737ca746c98ee89483b8bc3753
              name: 'User [{#USER_NAME}] User Type'
              key: 'wavelog.user.type[{$DB_NAME},{#USER_ID}]'
              delay: 10m
              trends: '0'
              valuemap:
                name: 'User Types'
              tags:
                - tag: application
                  value: wavelog
        - uuid: 1ea24cbd7ec642d5af5b1977178940de
          name: 'Worker Discovery'
          key: wavelog.worker.discovery
          delay: 1h
          item_prototypes:
            - uuid: 42e1171d1fc242b6b6147a6dfae84632
              name: 'Wavelog Worker Connected Clients'
              type: DEPENDENT
              key: 'wavelog.worker.clients[{#SINGLETON}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.connected_clients
              master_item:
                key: 'wavelog.worker.status[{#SINGLETON}]'
              tags:
                - tag: application
                  value: wavelog
            - uuid: 39935666cde6468192e3076f00fc6b2b
              name: 'Wavelog Worker Status (raw)'
              key: 'wavelog.worker.status[{#SINGLETON}]'
              value_type: TEXT
              tags:
                - tag: application
                  value: wavelog
            - uuid: a036b5fe9a9d4b5bbfcca0e6fb7cf544
              name: 'Wavelog Worker Active Topics'
              type: DEPENDENT
              key: 'wavelog.worker.topics.active[{#SINGLETON}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.active_topics
              master_item:
                key: 'wavelog.worker.status[{#SINGLETON}]'
              tags:
                - tag: application
                  value: wavelog
            - uuid: 92e993f938264aaf8494f932d87c889a
              name: 'Wavelog Worker Registered Topics'
              type: DEPENDENT
              key: 'wavelog.worker.topics.registered[{#SINGLETON}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.registered_topics
              master_item:
                key: 'wavelog.worker.status[{#SINGLETON}]'
              tags:
                - tag: application
                  value: wavelog
            - uuid: c2c15cc33dbe4153a72ed1bd0766c801
              name: 'Wavelog Worker Status'
              type: DEPENDENT
              key: 'wavelog.worker.up[{#SINGLETON}]'
              value_type: CHAR
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.status
              master_item:
                key: 'wavelog.worker.status[{#SINGLETON}]'
              tags:
                - tag: application
                  value: wavelog
              trigger_prototypes:
                - uuid: c1376ff4a8f14fd7be1cef533352142e
                  expression: 'last(/Wavelog by Zabbix agent2/wavelog.worker.up[{#SINGLETON}])<>"ok"'
                  name: 'Wavelog Worker status not ok'
                  priority: AVERAGE
                  manual_close: 'YES'
                - uuid: b97d31fc2e604bacbb2475b884dcf00d
                  expression: 'nodata(/Wavelog by Zabbix agent2/wavelog.worker.up[{#SINGLETON}],3m)=1'
                  name: 'Wavelog Worker unreachable'
                  priority: HIGH
            - uuid: 77d928a5f9cf44e29988038c34aa21de
              name: 'Wavelog Worker Version'
              type: DEPENDENT
              key: 'wavelog.worker.version[{#SINGLETON}]'
              value_type: CHAR
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.version
              master_item:
                key: 'wavelog.worker.status[{#SINGLETON}]'
              tags:
                - tag: application
                  value: wavelog
              trigger_prototypes:
                - uuid: 2332e5d379e4477685a7b4f17190cf03
                  expression: 'change(/Wavelog by Zabbix agent2/wavelog.worker.version[{#SINGLETON}])<>0'
                  name: 'Wavelog Worker version changed'
                  priority: INFO
                  manual_close: 'YES'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  // Gate purely on the operator's declared intent, independent of reachability.
                  return '{$WAVELOG_WORKER_ENABLED}' === '1'
                      ? JSON.stringify([{ '{#SINGLETON}': '0' }])
                      : '[]';
      tags:
        - tag: component
          value: wavelog
      macros:
        - macro: '{$ACTIVE_THRESHOLD}'
          value: '3'
          description: 'Defines the threshold of how long an user is seen as active. In Minutes.'
        - macro: '{$DB_NAME}'
          value: wavelog
          description: 'Name of the database. Credentials and host are read from the mysql defaults file (see README).'
        - macro: '{$MAX_LOGIN_ATTEMPTS}'
          value: '3'
          description: 'How many failed login attempts. Keep in sync with config value in config.php (check sample config if you don''t find it)'
        - macro: '{$QSO_TABLE}'
          value: TABLE_HRD_CONTACTS_V01
          description: 'Usually TABLE_HRD_CONTACTS_V01, but can be renamed. Leave default if unchanged'
        - macro: '{$WAVELOG_PATH}'
          value: /var/www/html
          description: 'Webroot of Wavelog. Change to your needs'
        - macro: '{$WAVELOG_WORKER_ENABLED}'
          value: '0'
          description: 'Default disabled as the Worker is optional'
        - macro: '{$WAVELOG_WORKER_HOST}'
          value: 127.0.0.1
          description: 'Bind Address of the Worker'
        - macro: '{$WAVELOG_WORKER_PORT}'
          value: '9001'
          description: 'Internal Port of the Wavelog Worker'
      valuemaps:
        - uuid: d7ab90e8d8dd45b4970a4bb2bb2269a0
          name: 'User Types'
          mappings:
            - value: '3'
              newvalue: operator
            - value: '99'
              newvalue: admin
  triggers:
    - uuid: de5cacc8f70948098bfe74279aff2848
      expression: 'last(/Wavelog by Zabbix agent2/wavelog.mig_version[{$DB_NAME}])<last(/Wavelog by Zabbix agent2/wavelog.mig_version_file[{$WAVELOG_PATH}])'
      name: 'Wavelog: Migration failed'
      priority: HIGH
      description: 'Either the Migration did not run yet (just open any page in Wavelog to fix) or the Migration failed for any reason. Check the Debug Page'
    - uuid: 12a117aa227448a3889fb39731b80c61
      expression: 'last(/Wavelog by Zabbix agent2/wavelog.app_version[{$DB_NAME}])<>last(/Wavelog by Zabbix agent2/wavelog.avail_version[{$DB_NAME}])'
      name: 'Wavelog: New Version Available'
      priority: INFO
      description: 'There is a new Wavelog Version available. Update the Wavelog Instance to get new features and bug fixes'
      manual_close: 'YES'
