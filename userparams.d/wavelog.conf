# Credentials (user, password, host) are read from a mysql defaults file so they
# never appear on the command line / in the process list. See README for setup.
# $1 = database name, $2 = extra argument (threshold / table / discovered id)

UserParameter=wavelog.active_users[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT COUNT(last_seen) FROM users WHERE TIMESTAMPDIFF(MINUTE, last_seen, UTC_TIMESTAMP()) < $2;" $1
UserParameter=wavelog.total_qsos[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT COUNT(COL_PRIMARY_KEY) FROM $2;" $1
UserParameter=wavelog.total_users[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT COUNT(user_id) FROM users WHERE clubstation=0;" $1
UserParameter=wavelog.total_clubstations[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT COUNT(user_id) FROM users WHERE clubstation=1;" $1
UserParameter=wavelog.mig_version[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT version FROM migrations ORDER BY version DESC LIMIT 1;" $1
UserParameter=wavelog.app_version[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT option_value FROM options WHERE option_name = 'version';" $1
UserParameter=wavelog.avail_version[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT option_value FROM options WHERE option_name = 'latest_release';" $1
UserParameter=wavelog.total_locations[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT COUNT(station_id) FROM station_profile;" $1
UserParameter=wavelog.total_logbooks[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT COUNT(logbook_id) FROM station_logbooks;" $1

UserParameter=wavelog.mig_version_file[*],grep migration_version $1/application/config/migration.php 2>/dev/null | grep -oE '[0-9]+' || echo 0

UserParameter=wavelog.mastercron.last_run[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT option_value FROM options WHERE option_name = 'mastercron_last_run';" $1
UserParameter=wavelog.cron.discovery[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT CONCAT('{\"data\":[', GROUP_CONCAT(CONCAT('{', '\"{\#CRON_ID}\":\"', id, '\",', '\"{\#CRON_DESC}\":\"', description, '\"', '}') SEPARATOR ','), ']}') FROM cron;" $1
UserParameter=wavelog.cron.status[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT status FROM cron WHERE id = '$2';" $1
UserParameter=wavelog.cron.enabled[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT enabled FROM cron WHERE id = '$2';" $1
UserParameter=wavelog.cron.last_run[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT last_run FROM cron WHERE id = '$2';" $1
UserParameter=wavelog.cron.next_run[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT next_run FROM cron WHERE id = '$2';" $1

UserParameter=wavelog.user.discovery[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT CONCAT('{\"data\":[', GROUP_CONCAT(CONCAT('{', '\"{\#USER_ID}\":\"', user_id, '\",', '\"{\#USER_NAME}\":\"', user_name, '\",', '\"{\#USER_CALLSIGN}\":\"', user_callsign, '\"', '}') SEPARATOR ','), ']}') FROM users WHERE clubstation=0;" $1
UserParameter=wavelog.user.last_seen[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT last_seen FROM users WHERE user_id = '$2';" $1
UserParameter=wavelog.user.type[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT user_type FROM users WHERE user_id = '$2';" $1
UserParameter=wavelog.user.email[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT user_email FROM users WHERE user_id = '$2';" $1
UserParameter=wavelog.user.callsign[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT user_callsign FROM users WHERE user_id = '$2';" $1
UserParameter=wavelog.user.login_attempts[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT login_attempts FROM users WHERE user_id = '$2';" $1

UserParameter=wavelog.cat.discovery[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT CONCAT('{\"data\":[', GROUP_CONCAT(CONCAT('{', '\"{\#CAT_ID}\":\"', id, '\",', '\"{\#CAT_RADIO}\":\"', radio, '\",', '\"{\#CAT_USER_ID}\":\"', user_id, '\"', '}') SEPARATOR ','), ']}') FROM cat;" $1
UserParameter=wavelog.cat.last_modified[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT last_modified FROM cat WHERE id = '$2';" $1
UserParameter=wavelog.cat.frequency[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT frequency FROM cat WHERE id = '$2';" $1
UserParameter=wavelog.cat.mode[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT mode FROM cat WHERE id = '$2';" $1
UserParameter=wavelog.cat.power[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT power FROM cat WHERE id = '$2';" $1
UserParameter=wavelog.cat.operator[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT u.user_callsign FROM cat c JOIN users u ON c.operator = u.user_id WHERE c.id = '$2';" $1
UserParameter=wavelog.cat.user[*],mysql --defaults-extra-file=/etc/zabbix/.my.cnf -NB -e "SELECT u.user_callsign FROM cat c JOIN users u ON c.user_id = u.user_id WHERE c.id = '$2';" $1

# Optional if a Wavelog Worker is used (https://github.com/wavelog/wavelog_worker)
# Change the Worker Secret
#
# UserParameter=wavelog.worker.discovery,echo '[{"{#SINGLETON}":"0"}]'
# UserParameter=wavelog.worker.status[*],curl -sf -H "X-Worker-Secret: CHANGE_ME" http://127.0.0.1:9001/internal/status
